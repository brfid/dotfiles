server:
    # Listen only on localhost. Pi-hole talks to Unbound here.
    interface: 127.0.0.1
    port: 5335

    do-ip4: yes
    do-udp: yes
    do-tcp: yes
    do-ip6: no
    prefer-ip6: no

    # Bootstrap with root hints and DNSSEC trust anchor
    root-hints: "/usr/share/dns/root.hints"

    # Security hardening
    hide-identity: yes
    hide-version: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    qname-minimisation: yes
    prefetch: yes
    use-caps-for-id: no
    edns-buffer-size: 1232

    # Cache tuning for Raspberry Pi
    msg-cache-size: 50m
    rrset-cache-size: 100m
    cache-min-ttl: 3600
    cache-max-ttl: 86400

    # Access control (only Pi-hole on same host)
    access-control: 127.0.0.1/32 allow

    # Logging
    logfile: "/var/log/unbound/unbound.log"
    verbosity: 0
