version = 1
tool = "codex"
live_root = "~/.codex"

[[managed]]
name = "config"
repo = "config.toml"
live = "config.toml"
actions = ["import", "copy"]

[[managed]]
name = "instructions"
repo = "instructions/caveman.md"
live = "instructions.md"
actions = ["copy", "link"]

[[managed]]
name = "rules"
repo = "rules/default.rules"
live = "rules/default.rules"
actions = ["import", "copy"]

[[managed]]
name = "memories"
repo = "memories/markdown-soft-wrap.md"
live = "memories/markdown-soft-wrap.md"
actions = ["import", "copy"]

[[unmanaged]]
live = "auth.json"
class = "secret"

[[unmanaged]]
live = "history.jsonl"
class = "state"

[[unmanaged]]
live = "sessions/**"
class = "state"

[[unmanaged]]
live = "log/**"
class = "state"

[[unmanaged]]
live = "logs_*.sqlite*"
class = "state"

[[unmanaged]]
live = "state_*.sqlite*"
class = "state"

[[unmanaged]]
live = "cache/**"
class = "cache"

[[unmanaged]]
live = "tmp/**"
class = "cache"

[[unmanaged]]
live = ".tmp/**"
class = "cache"

[[unmanaged]]
live = "shell_snapshots/**"
class = "state"

[[unmanaged]]
live = "plugins/cache/**"
class = "generated"

[[unmanaged]]
live = "skills/.system/**"
class = "generated"

[[unmanaged]]
live = "AGENTS.md"
class = "plugin-owned"

[[unmanaged]]
live = "agents/compound-engineering/**"
class = "plugin-owned"

[[unmanaged]]
live = "compound-engineering/**"
class = "plugin-owned"

[[unmanaged]]
live = "skills/compound-engineering/**"
class = "plugin-owned"

[[unmanaged]]
live = "config.toml.bak.*"
class = "backup"

[[unmanaged]]
live = "models_cache.json"
class = "cache"

[[unmanaged]]
live = "version.json"
class = "state"

[[unmanaged]]
live = "installation_id"
class = "state"

[[unmanaged]]
live = "session_index.jsonl"
class = "state"

[[verify]]
run = 'test -f "$HOME/.codex/config.toml"'

[[verify]]
run = 'test -e "$HOME/.codex/instructions.md"'

[[verify]]
run = 'test -f "$HOME/.codex/rules/default.rules"'

[[verify]]
run = 'test -f "$HOME/.codex/memories/markdown-soft-wrap.md"'
