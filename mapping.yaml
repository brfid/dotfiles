# Dotfiles symlink mapping
#
# source: path relative to this repo root
# target: absolute path (~ expanded)
#
# Machine detection: uname -s (Darwin = macOS, Linux = Pi/other)
# Architecture:      uname -m (aarch64 = Pi)
#
# To deploy: read AGENTS.md, then create symlinks per the relevant profiles.

common:
  shell/aliases:          ~/.config/shell/aliases
  nvim:                   ~/.config/nvim
  tmux/tmux.conf:         ~/.tmux.conf
  # tmux scripts: symlink individually into ~/.tmux/ (not as a subdir —
  # tpm installs plugins into ~/.tmux/plugins/ so ~/.tmux/ must be a real dir)
  tmux/scripts/cpu.sh:    ~/.tmux/cpu.sh
  tmux/scripts/cpupct.sh: ~/.tmux/cpupct.sh
  tmux/scripts/disk.sh:   ~/.tmux/disk.sh
  tmux/scripts/git.sh:    ~/.tmux/git.sh
  tmux/scripts/load.sh:   ~/.tmux/load.sh
  tmux/scripts/net.sh:    ~/.tmux/net.sh
  tmux/scripts/ram.sh:    ~/.tmux/ram.sh
  tmux/scripts/swap.sh:   ~/.tmux/swap.sh
  tmux/scripts/temp.sh:   ~/.tmux/temp.sh
  tmux/scripts/uptime.sh: ~/.tmux/uptime.sh
  # git: individual files — ~/.config/git/ also contains runtime 'ignore'
  git/.gitleaks.toml:     ~/.config/git/.gitleaks.toml
  git/hooks:              ~/.config/git/hooks
  gh/config.yml:          ~/.config/gh/config.yml
  # claude: individual items — ~/.claude/ contains runtime history/sessions
  claude/CLAUDE.md:       ~/.claude/CLAUDE.md
  claude/settings.json:   ~/.claude/settings.json
  claude/commands:        ~/.claude/commands
  claude/plugins:         ~/.claude/plugins
  # copilot: individual files — ~/.copilot/ contains runtime config/logs
  copilot/copilot-instructions.md: ~/.copilot/copilot-instructions.md
  copilot/mcp-config.json:         ~/.copilot/mcp-config.json
  vscode/settings.json:   ~/.config/Code/User/settings.json
  vscode/snippets:        ~/.config/Code/User/snippets
  yazi:                   ~/.config/yazi

pi:
  shell/bashrc:            ~/.bashrc
  gdrive-backup/config.toml: ~/.config/gdrive-backup/config.toml
  shell/local/pi.sh:       ~/.config/shell/local
  neomutt:                 ~/.config/neomutt
  x11/xinitrc:             ~/.xinitrc
  x11/xprofile:            ~/.xprofile
  systemd:                 ~/.config/systemd/user

  # keyboard: hwdb files require sudo — see keyboard/README.md
  #   keyboard/90-leopold-fc900rw.hwdb:  /etc/udev/hwdb.d/90-leopold-fc900rw.hwdb
  #   keyboard/90-leopold-fc660mbt.hwdb: /etc/udev/hwdb.d/90-leopold-fc660mbt.hwdb

macos:
  shell/zshrc:              ~/.zshrc
  shell/local/macos.sh:     ~/.config/shell/local
