# Extends the built-in gitleaks ruleset with generic public-safety checks.

[extend]
useDefault = true

[[rules]]
id = "generic-password-assignment"
description = "Hardcoded password assignment"
regex = '''(?i)(password|passwd|pwd)\s*[=:]\s*["']?[^\s"']{8,}'''
tags = ["password"]
[rules.allowlist]
regexes = [
    '''(?i)(example|placeholder|changeme|xxxx|your[_-]|dummy|template)''',
]
paths = [
    '''secrets/render-neomutt-account''',
]

[[rules]]
id = "personal-email"
description = "Personal email address"
regex = '''[a-zA-Z0-9._%+-]+@(gmail|icloud|yahoo|hotmail|outlook|protonmail)\.(com|net|org)'''
tags = ["pii"]
[rules.allowlist]
regexes = [
    '''(?i)(example|you@|user@|someone@|placeholder)''',
]

[[rules]]
id = "app-password"
description = "App-password format in assignment context"
regex = '''(?i)(password|passwd|token|secret|key|credential)\s*[=:]\s*["']?[a-z]{4}\s[a-z]{4}\s[a-z]{4}\s[a-z]{4}'''
tags = ["password"]
[rules.allowlist]
regexes = [
    '''(?i)(xxxx|example|placeholder)''',
]

[[rules]]
id = "generic-secret-assignment"
description = "Secret, token, or credential assignment"
regex = '''(?i)\b(api[_-]?key|access[_-]?token|auth[_-]?token|bearer[_-]?token|client[_-]?secret|secret[_-]?key|private[_-]?key|credential|credentials|session[_-]?cookie)\b\s*[=:]\s*["']?([A-Za-z0-9_./+=:@%-]{16,})'''
secretGroup = 2
tags = ["secret"]
[rules.allowlist]
regexes = [
    '''(?i)(example|placeholder|changeme|dummy|xxxx|your[_-])''',
]

[[rules]]
id = "sensitive-env-assignment"
description = "Sensitive environment variable assignment"
regex = '''(?i)\b(export\s+)?(AWS_ACCESS_KEY_ID|AWS_SECRET_ACCESS_KEY|OPENAI_API_KEY|ANTHROPIC_API_KEY|GITHUB_TOKEN|GH_TOKEN|SLACK_BOT_TOKEN|DATABASE_URL)\s*=\s*["']?([^"'\s]{8,})'''
secretGroup = 3
tags = ["secret", "env"]
[rules.allowlist]
regexes = [
    '''(?i)(example|placeholder|changeme|dummy|xxxx|your[_-])''',
]

[[rules]]
id = "private-key-block"
description = "Private key block"
regex = '''-----BEGIN [A-Z0-9 ]*PRIVATE KEY-----'''
tags = ["key"]

[[rules]]
id = "url-basic-auth"
description = "URL with embedded credentials"
regex = '''(?i)\bhttps?://[^:/\s]+:[^@\s]+@[^/\s]+'''
tags = ["secret", "url"]

[[rules]]
id = "phone-number"
description = "Phone number"
regex = '''\b(?:\+1[ .-]?)?(?:\(\d{3}\)|\d{3})[ .-]\d{3}[ .-]\d{4}\b'''
tags = ["pii"]

[[rules]]
id = "street-address"
description = "Possible street address"
regex = '''\d{1,5}\s+[A-Z][a-z]+\s+(St|Ave|Blvd|Dr|Ln|Rd|Way|Ct|Pl|Cir)\b'''
tags = ["pii"]

[[rules]]
id = "ssn"
description = "Social Security Number"
regex = '''\b\d{3}-\d{2}-\d{4}\b'''
tags = ["pii"]

[[rules]]
id = "birth-date-assignment"
description = "Birth date in assignment context"
regex = '''(?i)\b(date[_ -]?of[_ -]?birth|dob|birthday)\b\s*[=:]\s*["']?([0-9]{1,2}[/-][0-9]{1,2}[/-][0-9]{2,4}|[0-9]{4}-[0-9]{2}-[0-9]{2})'''
secretGroup = 2
tags = ["pii"]

[[rules]]
id = "full-name-assignment"
description = "Full legal name in assignment context"
regex = '''(?i)\b(real[_-]?name|full[_-]?name|legal[_-]?name)\b\s*[=:]\s*["']?([A-Z][a-z]+ [A-Z][A-Za-z'-]+)'''
secretGroup = 2
tags = ["pii"]
[rules.allowlist]
regexes = [
    '''(?i)(Example Person|Jane Doe|John Doe)''',
]

[[rules]]
id = "precise-coordinate-assignment"
description = "Precise location coordinate in assignment context"
regex = '''(?i)\b(lat|latitude|lon|lng|longitude)\b\s*[=:]\s*["']?(-?[0-9]{1,3}\.[0-9]{4,})'''
secretGroup = 2
tags = ["pii", "location"]

[[rules]]
id = "local-home-path"
description = "User-specific home directory path"
regex = '''(?i)(^|[^A-Za-z0-9_./-])(/home/[a-z0-9._-]+|/Users/[A-Za-z0-9._-]+)(/[^"'\s)]*)?'''
secretGroup = 2
tags = ["pii", "path"]
[rules.allowlist]
regexes = [
    '''(?i)(/home/user|/home/example|/Users/user|/Users/example)''',
]

[[rules]]
id = "ssh-identity-path"
description = "SSH identity file path"
regex = '''(?i)\b(identityfile|identity_file)\s+["']?(/home|/Users)/[^"'\s]+'''
tags = ["secret", "ssh"]

[[rules]]
id = "private-ipv4-address"
description = "Private, CGNAT, or link-local IPv4 address"
regex = '''(?i)(^|[^0-9A-Za-z:.])((10|192\.168)\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}|172\.(1[6-9]|2[0-9]|3[0-1])\.[0-9]{1,3}\.[0-9]{1,3}|100\.(6[4-9]|[7-9][0-9]|1[01][0-9]|12[0-7])\.[0-9]{1,3}\.[0-9]{1,3}|169\.254\.[0-9]{1,3}\.[0-9]{1,3})(/[0-9]{1,2})?([^0-9A-Za-z:.]|$)'''
secretGroup = 2
tags = ["pii", "network"]
[rules.allowlist]
regexes = ['''100\.100\.100\.100''']

[[rules]]
id = "private-ipv6-address"
description = "Unique-local or link-local IPv6 address"
regex = '''(?i)(^|[^0-9a-f:])((f[c-d][0-9a-f]{0,2}|fe80):[0-9a-f:]*(:|/[0-9]{1,3}|$))'''
tags = ["pii", "network"]
