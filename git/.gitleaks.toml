# Custom gitleaks rules — extends the built-in ruleset.
# Place in repo root or reference via --config.
# The global pre-commit hook uses built-in rules by default;
# this file adds repo-specific patterns.

[extend]
# Use the default gitleaks config as a base
useDefault = true

# ── Custom rules ────────────────────────────────────────

[[rules]]
id = "generic-password-assignment"
description = "Hardcoded password assignment"
regex = '''(?i)(password|passwd|pwd)\s*[=:]\s*["']?[^\s"']{8,}'''
tags = ["password"]
[rules.allowlist]
regexes = [
    '''(?i)(example|placeholder|changeme|xxxx|your[_-]|dummy|template)''',
]

[[rules]]
id = "personal-email"
description = "Personal email address"
regex = '''[a-zA-Z0-9._%+-]+@(gmail|icloud|yahoo|hotmail|outlook|protonmail)\.(com|net|org)'''
tags = ["pii"]
[rules.allowlist]
regexes = [
    '''(?i)(example|you@|user@|someone@|placeholder)''',
]
paths = [
    '''secrets\.example$''',
    '''\.gitconfig\.example$''',
    '''neomuttrc\.example$''',
    '''install\.sh$''',
]

[[rules]]
id = "app-password"
description = "Google/Apple app password format (four groups of four letters) in assignment context"
regex = '''(?i)(password|passwd|token|secret|key|credential)\s*[=:]\s*["']?[a-z]{4}\s[a-z]{4}\s[a-z]{4}\s[a-z]{4}'''
tags = ["password"]
[rules.allowlist]
regexes = [
    '''(?i)(xxxx|example|placeholder)''',
]
paths = [
    '''secrets\.example$''',
]

[[rules]]
id = "tailscale-key"
description = "Tailscale auth key"
regex = '''tskey-[a-zA-Z0-9-]{20,}'''
tags = ["key"]

[[rules]]
id = "telegram-bot-token"
description = "Telegram bot token"
regex = '''\d{8,10}:[A-Za-z0-9_-]{35}'''
tags = ["key"]

[[rules]]
id = "brave-api-key"
description = "Brave Search API key"
regex = '''BSA[A-Za-z0-9]{20,}'''
tags = ["key"]

# ── PII rules ──────────────────────────────────────────

[[rules]]
id = "phone-number"
description = "Phone number (US format)"
regex = '''\b(?:\+1[ .-]?)?(?:\(\d{3}\)|\d{3})[ .-]\d{3}[ .-]\d{4}\b'''
tags = ["pii"]
[rules.allowlist]
paths = ['''secrets\.example$''']

[[rules]]
id = "street-address"
description = "Possible street address"
regex = '''\d{1,5}\s+[A-Z][a-z]+\s+(St|Ave|Blvd|Dr|Ln|Rd|Way|Ct|Pl|Cir)\b'''
tags = ["pii"]

[[rules]]
id = "ssn"
description = "Social Security Number"
regex = '''\b\d{3}-\d{2}-\d{4}\b'''
tags = ["pii"]

[[rules]]
id = "private-ipv4-address"
description = "Private, CGNAT, or link-local IPv4 address"
regex = '''(?i)(^|[^0-9A-Za-z:.])((10|192\.168)\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}|172\.(1[6-9]|2[0-9]|3[0-1])\.[0-9]{1,3}\.[0-9]{1,3}|100\.(6[4-9]|[7-9][0-9]|1[01][0-9]|12[0-7])\.[0-9]{1,3}\.[0-9]{1,3}|169\.254\.[0-9]{1,3}\.[0-9]{1,3})(/[0-9]{1,2})?([^0-9A-Za-z:.]|$)'''
secretGroup = 2
tags = ["pii", "network"]
[rules.allowlist]
regexes = ['''100\.100\.100\.100''']

[[rules]]
id = "private-ipv6-address"
description = "Unique-local or link-local IPv6 address"
regex = '''(?i)(^|[^0-9a-f:])((f[c-d][0-9a-f]{0,2}|fe80):[0-9a-f:]*(:|/[0-9]{1,3}|$))'''
tags = ["pii", "network"]
