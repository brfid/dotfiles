set -g mouse on
set -g history-limit 100000
setw -g mode-keys vi
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# This machine uses Alacritty with xclip for clipboard integration.
# Ensure DISPLAY is set in tmux global environment before attaching.
set -g update-environment "DISPLAY XAUTHORITY WINDOWID"
set -g set-clipboard external
set -g @copy_command 'xclip -selection clipboard -in'

# Copy from tmux copy-mode into both tmux buffer and the desktop clipboard.
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "#{@copy_command}"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "#{@copy_command}"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "#{@copy_command}"
bind-key -T copy-mode y send-keys -X copy-pipe-and-cancel "#{@copy_command}"
bind-key -T copy-mode Enter send-keys -X copy-pipe-and-cancel "#{@copy_command}"
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "#{@copy_command}"

# Toggle tmux mouse when raw terminal selection is needed.
# Prefix + M: mouse off => terminal drag select. Prefix + M again restores tmux mouse.
bind-key M if -F '#{mouse}' 'set -g mouse off \; display-message "mouse off: terminal selection active"' 'set -g mouse on \; display-message "mouse on: tmux selection active"'

# Status bar
set -g status-interval 60
set -g status-style 'bg=colour240 fg=colour250'
set -g window-status-current-style 'fg=colour208'
set -g pane-border-style 'fg=colour208'
set -g pane-active-border-style 'fg=colour208'

set -g status-left '#[fg=colour208]#S  #[fg=colour208]#{=-35:pane_current_path} #[default] '
set -g status-left-length 100

set -g status-right '#[fg=colour208]#(~/.tmux/status-lite.sh)'
set -g status-right-length 80

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'alexwforsythe/tmux-which-key'

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
