name: markdown

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mdformat:
    name: mdformat
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Markdown tooling
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install mdformat mdformat-gfm mdformat-frontmatter

      - name: Check Markdown formatting
        run: ./scripts/check_markdown.sh
